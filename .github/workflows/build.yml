name: Build sing-box rule sets

on:
  schedule:
    - cron: '30 20 * * *'  # 每天 UTC 20:30 (北京时间 04:30)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          SING_BOX_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "Installing sing-box ${SING_BOX_VERSION}"
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          tar xzf sing-box.tar.gz
          sudo mv sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box /usr/local/bin/
          sing-box version

      - name: Download source rulesets
        run: |
          mkdir -p source srs

          # SukkaW domainset
          curl -fSL -o source/reject.json          "https://ruleset.skk.moe/sing-box/domainset/reject.json"
          curl -fSL -o source/reject_extra.json     "https://ruleset.skk.moe/sing-box/domainset/reject_extra.json"

          # SukkaW non_ip
          curl -fSL -o source/reject_non_ip.json    "https://ruleset.skk.moe/sing-box/non_ip/reject.json"
          curl -fSL -o source/domestic.json          "https://ruleset.skk.moe/sing-box/non_ip/domestic.json"
          curl -fSL -o source/direct.json            "https://ruleset.skk.moe/sing-box/non_ip/direct.json"
          curl -fSL -o source/global.json            "https://ruleset.skk.moe/sing-box/non_ip/global.json"

          # SukkaW ip
          curl -fSL -o source/reject_ip.json        "https://ruleset.skk.moe/sing-box/ip/reject.json"
          curl -fSL -o source/china_ip.json          "https://ruleset.skk.moe/sing-box/ip/china_ip.json"

          echo "=== Downloaded ==="
          ls -lh source/

      - name: Compile to .srs binary
        run: |
          for f in source/*.json; do
            name=$(basename "$f" .json)
            sing-box rule-set compile -o "srs/${name}.srs" "$f"
            echo "${name}: $(wc -c < "$f") -> $(wc -c < "srs/${name}.srs") bytes"
          done

          echo "=== Compiled ==="
          ls -lh srs/

      - name: Generate checksums
        run: |
          cd srs
          sha256sum *.srs > sha256sum.txt
          cat sha256sum.txt

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: "Rule Sets ${{ steps.date.outputs.date }}"
          body: |
            Auto-built sing-box binary rule sets (.srs) from [SukkaW/Surge](https://github.com/SukkaW/Surge).

            Source: [ruleset.skk.moe](https://ruleset.skk.moe)
            Built: ${{ steps.date.outputs.date }}
          files: srs/*
          make_latest: true
